<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes bruits bizarres</title>
  <link rel="stylesheet" href="style.css" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Bruits" />
</head>

<body class="is-home">

  <!-- 🎬 VIDEO GLOBAL BACKGROUND (FIX IMPORTANT) -->
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="assets/HelloKitty2.mov">
  </video>

  <!-- ========== PAGE ACCUEIL ========== -->
  <div id="page-home" class="page active">

    <img src="assets/MediaPlayer.png" class="media-player" id="media-player" alt="" />
    <img src="assets/Amp.png" class="deco-amp" id="deco-amp" alt="" />
    <img src="assets/enter_button.png" class="enter-btn" id="enter-btn" alt="Enter" />
  </div>

  <!-- ========== PAGE PERSONNAGES ========== -->
  <div id="page-persons" class="page">

    <div class="sb-header">
      <img src="assets/home_button.png" class="home-btn" onclick="goHome()" alt="Home" />
    </div>

    <div class="persons-grid" id="persons-grid"></div>
  </div>

  <!-- ========== PAGE SOUNDBOARD ========== -->
  <div id="page-soundboard" class="page">

    <div class="sb-header">
      <button class="back-btn" onclick="goPersons()">← Retour</button>

      <div class="sb-person-info">
        <div class="sb-avatar" id="sb-avatar"></div>
        <div>
          <div class="sb-name" id="sb-name"></div>
          <div class="sb-count" id="sb-count"></div>
        </div>
      </div>
    </div>

    <div class="sounds-grid" id="sounds-grid"></div>
  </div>

<script>
const persons = [
  { id: 1, name: "Personne 1", avatar: "😄", sounds: [] },
  { id: 2, name: "Personne 2", avatar: "🤪", sounds: [] },
  { id: 3, name: "Personne 3", avatar: "🎭", sounds: [] },
  { id: 4, name: "Personne 4", avatar: "🦄", sounds: [] }
];

// ============================
// PERSONNAGES (CLEAN + DRAG)
// ============================
const personsGrid = document.getElementById('persons-grid');

const positions = [
  { x: 40, y: 40 },
  { x: 180, y: 80 },
  { x: 60, y: 220 },
  { x: 200, y: 240 }
];

persons.forEach((person, i) => {
  const card = document.createElement('div');
  card.className = 'person-card';

  card.style.left = positions[i].x + "px";
  card.style.top = positions[i].y + "px";

  card.innerHTML = `
    <img src="assets/Character${person.id}.png" class="person-img" />
  `;

  card.addEventListener('click', () => openSoundboard(person));

  makeDraggable(card);
  personsGrid.appendChild(card);
});

// ============================
// NAVIGATION
// ============================
document.getElementById('enter-btn').addEventListener('click', goPersons);

function openSoundboard(person) {
  document.getElementById('page-persons').classList.remove('active');
  document.getElementById('page-soundboard').classList.add('active');

  document.getElementById('sb-avatar').textContent = person.avatar;
  document.getElementById('sb-name').textContent = person.name;
  document.getElementById('sb-count').textContent =
    `${person.sounds.length} son${person.sounds.length > 1 ? 's' : ''}`;

  const grid = document.getElementById('sounds-grid');
  grid.innerHTML = '';
}

function goHome() {
  stopSound();
  document.body.classList.add('is-home');
  document.getElementById('page-home').classList.add('active');
  document.getElementById('page-persons').classList.remove('active');
  document.getElementById('page-soundboard').classList.remove('active');
}

function goPersons() {
  stopSound();
  document.body.classList.remove('is-home');
  document.getElementById('page-home').classList.remove('active');
  document.getElementById('page-soundboard').classList.remove('active');
  document.getElementById('page-persons').classList.add('active');
}

// ============================
// AUDIO (placeholder safe)
// ============================
function stopSound() {}

// ============================
// DRAG SYSTEM (WORK MOBILE + DESKTOP)
// ============================
function makeDraggable(el) {
  let dragging = false;
  let startX, startY, origX, origY;

  el.addEventListener('touchstart', e => {
    const t = e.touches[0];
    dragging = true;
    startX = t.clientX;
    startY = t.clientY;
    origX = el.offsetLeft;
    origY = el.offsetTop;
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    if (!dragging) return;
    e.preventDefault();
    const t = e.touches[0];
    el.style.left = (origX + t.clientX - startX) + 'px';
    el.style.top = (origY + t.clientY - startY) + 'px';
  }, { passive: false });

  el.addEventListener('touchend', () => dragging = false);

  el.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    origX = el.offsetLeft;
    origY = el.offsetTop;
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    el.style.left = (origX + e.clientX - startX) + 'px';
    el.style.top = (origY + e.clientY - startY) + 'px';
  });

  document.addEventListener('mouseup', () => dragging = false);
}

makeDraggable(document.getElementById('deco-amp'));
makeDraggable(document.getElementById('media-player'));
</script>

</body>
</html>
