<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes bruits bizarres</title>
  <link rel="stylesheet" href="style.css" />

  <!-- PWA : permet d'ajouter sur l'écran d'accueil iPhone -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Bruits" />
</head>
<body>

  <!-- ========== PAGE ACCUEIL ========== -->
  <div id="page-home" class="page active">
    <h1 class="app-title">🎵 Mes bruits bizarres</h1>
    <p class="app-subtitle">Choisissez un personnage</p>
    <div class="persons-grid" id="persons-grid"></div>
  </div>

  <!-- ========== PAGE SOUNDBOARD ========== -->
  <div id="page-soundboard" class="page">
    <div class="sb-header">
      <button class="back-btn" onclick="goHome()">← Accueil</button>
      <div class="sb-person-info">
        <div class="sb-avatar" id="sb-avatar"></div>
        <div>
          <div class="sb-name" id="sb-name"></div>
          <div class="sb-count" id="sb-count"></div>
        </div>
      </div>
    </div>
    <div class="sounds-grid" id="sounds-grid"></div>
  </div>

  <script>
    // ================================================
    //  DONNÉES — modifie ici tes personnages et sons
    // ================================================
    const persons = [
      {
        id: 1,
        name: "Personne 1",
        // Remplace par le chemin vers une vraie image : "images/personne1.jpg"
        avatar: "😄",
        sounds: [
          { name: "Bruit bizarre 1", duration: "1s", image: "🎤", file: "sounds/p1_son1.mp3" },
          { name: "Son mystère",     duration: "2s", image: "🔊", file: "sounds/p1_son2.mp3" },
          { name: "Glou glou",       duration: "0.5s", image: "💧", file: "sounds/p1_son3.mp3" },
          { name: "Pfff...",         duration: "1.5s", image: "💨", file: "sounds/p1_son4.mp3" },
        ]
      },
      {
        id: 2,
        name: "Personne 2",
        avatar: "🤪",
        sounds: [
          { name: "Grognement",  duration: "1s",   image: "😤", file: "sounds/p2_son1.mp3" },
          { name: "Couinement",  duration: "0.8s", image: "🐭", file: "sounds/p2_son2.mp3" },
          { name: "Claquement",  duration: "0.3s", image: "👏", file: "sounds/p2_son3.mp3" },
        ]
      },
      {
        id: 3,
        name: "Personne 3",
        avatar: "🎭",
        sounds: [
          { name: "Rire étrange",  duration: "2s",   image: "😂", file: "sounds/p3_son1.mp3" },
          { name: "Soupir épique", duration: "1.2s", image: "😮", file: "sounds/p3_son2.mp3" },
          { name: "Bip bip",       duration: "0.4s", image: "📳", file: "sounds/p3_son3.mp3" },
          { name: "Hmmmm",         duration: "3s",   image: "🤔", file: "sounds/p3_son4.mp3" },
          { name: "Couic !",       duration: "0.2s", image: "🐣", file: "sounds/p3_son5.mp3" },
        ]
      },
      {
        id: 4,
        name: "Personne 4",
        avatar: "🦄",
        sounds: [
          { name: "Son secret", duration: "1s",   image: "🤫", file: "sounds/p4_son1.mp3" },
          { name: "Wouah",      duration: "0.7s", image: "😲", file: "sounds/p4_son2.mp3" },
        ]
      }
    ];

    // ================================================
    //  CONSTRUCTION DE LA PAGE ACCUEIL
    // ================================================
    const personsGrid = document.getElementById('persons-grid');

    persons.forEach(person => {
      const card = document.createElement('div');
      card.className = 'person-card';
      card.innerHTML = `
        <div class="avatar">${person.avatar}</div>
        <div class="person-name">${person.name}</div>
        <div class="person-count">${person.sounds.length} son${person.sounds.length > 1 ? 's' : ''}</div>
      `;
      card.addEventListener('click', () => openSoundboard(person));
      personsGrid.appendChild(card);
    });

    // ================================================
    //  NAVIGATION
    // ================================================
    function openSoundboard(person) {
      document.getElementById('page-home').classList.remove('active');
      document.getElementById('page-soundboard').classList.add('active');

      document.getElementById('sb-avatar').textContent = person.avatar;
      document.getElementById('sb-name').textContent = person.name;
      document.getElementById('sb-count').textContent =
        `${person.sounds.length} son${person.sounds.length > 1 ? 's' : ''}`;

      const soundsGrid = document.getElementById('sounds-grid');
      soundsGrid.innerHTML = '';

      person.sounds.forEach(sound => {
        const card = document.createElement('div');
        card.className = 'sound-card';
        card.innerHTML = `
          <div class="sound-img">${sound.image}</div>
          <div class="sound-name">${sound.name}</div>
          <div class="sound-duration">${sound.duration}</div>
        `;
        card.addEventListener('click', () => playSound(card, sound.file));
        soundsGrid.appendChild(card);
      });
    }

    function goHome() {
      stopCurrentSound();
      document.getElementById('page-soundboard').classList.remove('active');
      document.getElementById('page-home').classList.add('active');
    }

    // ================================================
    //  LECTURE DES SONS
    // ================================================
    let currentAudio = null;
    let currentCard  = null;

    function playSound(card, file) {
      // Arrêter le son en cours si un autre est déjà joué
      stopCurrentSound();

      const audio = new Audio(file);
      currentAudio = audio;
      currentCard  = card;

      card.classList.add('playing');

      audio.play().catch(() => {
        // Le fichier son n'existe pas encore — on joue un bip placeholder
        playPlaceholderBip();
      });

      audio.addEventListener('ended', () => {
        card.classList.remove('playing');
        currentAudio = null;
        currentCard  = null;
      });
    }

    function stopCurrentSound() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
      }
      if (currentCard) {
        currentCard.classList.remove('playing');
        currentCard = null;
      }
    }

    // Bip temporaire tant que les vrais sons ne sont pas là
    function playPlaceholderBip() {
      const ctx  = new (window.AudioContext || window.webkitAudioContext)();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 300 + Math.random() * 400;
      osc.type = ['sine','square','sawtooth','triangle'][Math.floor(Math.random() * 4)];
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.6);
    }
  </script>

</body>
</html>
