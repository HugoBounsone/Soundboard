<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes bruits bizarres</title>
  <link rel="stylesheet" href="style.css" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Bruits" />
</head>

<body class="is-home">

  <!-- ========== PAGE ACCUEIL ========== -->
  <div id="page-home" class="page active">
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="assets/HelloKitty2.mov" type="video/quicktime">
    </video>

    <img src="assets/MediaPlayer.png" class="media-player" id="media-player" alt="" />
    <img src="assets/Amp.png" class="deco-amp" id="deco-amp" alt="" />
    <img src="assets/enter_button.png" class="enter-btn" id="enter-btn" alt="Enter" />
  </div>

  <!-- ========== PAGE PERSONNAGES ========== -->
  <div id="page-persons" class="page">

    <div class="sb-header">
      <img src="assets/home_button.png" class="home-btn" onclick="goHome()" alt="Home" />
    </div>

    <div class="persons-grid" id="persons-grid"></div>
  </div>

  <!-- ========== PAGE SOUNDBOARD ========== -->
  <div id="page-soundboard" class="page">

    <div class="sb-header">
      <button class="back-btn" onclick="goPersons()">← Retour</button>

      <div class="sb-person-info">
        <div class="sb-avatar" id="sb-avatar"></div>
        <div>
          <div class="sb-name" id="sb-name"></div>
          <div class="sb-count" id="sb-count"></div>
        </div>
      </div>
    </div>

    <div class="sounds-grid" id="sounds-grid"></div>
  </div>

  <script>
    // ================================================
    // DONNÉES
    // ================================================
    const persons = [
      {
        id: 1,
        name: "Personne 1",
        avatar: "😄",
        sounds: [
          { name: "Bruit bizarre 1", duration: "1s", image: "🎤", file: "sounds/p1_son1.mp3" },
          { name: "Son mystère", duration: "2s", image: "🔊", file: "sounds/p1_son2.mp3" },
        ]
      },
      {
        id: 2,
        name: "Personne 2",
        avatar: "🤪",
        sounds: [
          { name: "Grognement", duration: "1s", image: "😤", file: "sounds/p2_son1.mp3" },
        ]
      },
      {
        id: 3,
        name: "Personne 3",
        avatar: "🎭",
        sounds: [
          { name: "Rire étrange", duration: "2s", image: "😂", file: "sounds/p3_son1.mp3" },
        ]
      },
      {
        id: 4,
        name: "Personne 4",
        avatar: "🦄",
        sounds: [
          { name: "Son secret", duration: "1s", image: "🤫", file: "sounds/p4_son1.mp3" },
        ]
      }
    ];

    // ================================================
    // PAGE PERSONNAGES
    // ================================================
    const personsGrid = document.getElementById('persons-grid');

   persons.forEach(person => {
  const card = document.createElement('div');
  card.className = 'person-card';

  card.innerHTML = `
    <img src="assets/Character${person.id}.png" class="person-img" />
  `;

  card.addEventListener('click', () => openSoundboard(person));
  personsGrid.appendChild(card);
});

    // ================================================
    // NAVIGATION
    // ================================================
    document.getElementById('enter-btn').addEventListener('click', goPersons);

    function openSoundboard(person) {
      document.getElementById('page-persons').classList.remove('active');
      document.getElementById('page-soundboard').classList.add('active');

      document.getElementById('sb-avatar').textContent = person.avatar;
      document.getElementById('sb-name').textContent = person.name;
      document.getElementById('sb-count').textContent =
        `${person.sounds.length} son${person.sounds.length > 1 ? 's' : ''}`;

      const soundsGrid = document.getElementById('sounds-grid');
      soundsGrid.innerHTML = '';

      person.sounds.forEach(sound => {
        const card = document.createElement('div');
        card.className = 'sound-card';

        card.innerHTML = `
          <div class="sound-img">${sound.image}</div>
          <div class="sound-name">${sound.name}</div>
          <div class="sound-duration">${sound.duration}</div>
        `;

        card.addEventListener('click', () => playSound(card, sound.file));
        soundsGrid.appendChild(card);
      });
    }

    function goHome() {
      stopCurrentSound();

      document.body.classList.add('is-home');
      document.getElementById('page-home').classList.add('active');
      document.getElementById('page-persons').classList.remove('active');
      document.getElementById('page-soundboard').classList.remove('active');
    }

    function goPersons() {
      stopCurrentSound();

      document.body.classList.remove('is-home');
      document.getElementById('page-home').classList.remove('active');
      document.getElementById('page-soundboard').classList.remove('active');
      document.getElementById('page-persons').classList.add('active');
    }

    // ================================================
    // AUDIO
    // ================================================
    let currentAudio = null;
    let currentCard = null;

    function playSound(card, file) {
      stopCurrentSound();

      const audio = new Audio(file);
      currentAudio = audio;
      currentCard = card;

      card.classList.add('playing');

      audio.play().catch(() => playPlaceholderBip());

      audio.addEventListener('ended', () => {
        card.classList.remove('playing');
        currentAudio = null;
        currentCard = null;
      });
    }

    function stopCurrentSound() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
      if (currentCard) {
        currentCard.classList.remove('playing');
        currentCard = null;
      }
    }

    function playPlaceholderBip() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.frequency.value = 300 + Math.random() * 400;
      osc.type = "sine";

      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);

      osc.start();
      osc.stop(ctx.currentTime + 0.6);
    }

    // ================================================
    // DRAG
    // ================================================
    function makeDraggable(element) {
      let dragging = false;
      let startX, startY, origX, origY;

      element.addEventListener('touchstart', e => {
        const t = e.touches[0];
        dragging = true;
        startX = t.clientX;
        startY = t.clientY;
        origX = element.offsetLeft;
        origY = element.offsetTop;
      }, { passive: true });

      element.addEventListener('touchmove', e => {
        if (!dragging) return;
        e.preventDefault();

        const t = e.touches[0];
        element.style.left = (origX + t.clientX - startX) + 'px';
        element.style.top = (origY + t.clientY - startY) + 'px';
      }, { passive: false });

      element.addEventListener('touchend', () => dragging = false);

      element.addEventListener('mousedown', e => {
        dragging = true;
        startX = e.clientX;
        startY = e.clientY;
        origX = element.offsetLeft;
        origY = element.offsetTop;
      });

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        element.style.left = (origX + e.clientX - startX) + 'px';
        element.style.top = (origY + e.clientY - startY) + 'px';
      });

      document.addEventListener('mouseup', () => dragging = false);
    }

    makeDraggable(document.getElementById('deco-amp'));
    makeDraggable(document.getElementById('media-player'));

  </script>
</body>
</html>
