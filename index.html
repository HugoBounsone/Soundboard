<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes bruits bizarres</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="is-home">

<!-- 🎬 VIDEO BACKGROUND GLOBAL -->
<video class="bg-video" autoplay muted loop playsinline>
  <source src="assets/HelloKitty2.mov">
</video>

<!-- ========== HOME ========== -->
<div id="page-home" class="page active">
  <img src="assets/MediaPlayer.png" class="media-player" id="media-player" />
  <img src="assets/Amp.png" class="deco-amp" id="deco-amp" />
  <img src="assets/enter_button.png" class="enter-btn" id="enter-btn" />
</div>

<!-- ========== PERSONNAGES ========== -->
<div id="page-persons" class="page">

  <div class="sb-header">
    <img src="assets/home_button.png" class="home-btn" onclick="goHome()" />
  </div>

  <div class="persons-grid" id="persons-grid"></div>
</div>

<!-- ========== SOUNDBOARD ========== -->
<div id="page-soundboard" class="page">

  <div class="sb-header">
    <button class="back-btn" onclick="goPersons()">← Retour</button>

    <div class="sb-person-info">
      <div class="sb-avatar" id="sb-avatar"></div>
      <div>
        <div class="sb-name" id="sb-name"></div>
        <div class="sb-count" id="sb-count"></div>
      </div>
    </div>
  </div>

  <div class="sounds-grid" id="sounds-grid"></div>
</div>

<script>
const persons = [
  { id: 1, name: "Personne 1", avatar: "😄", sounds: [] },
  { id: 2, name: "Personne 2", avatar: "🤪", sounds: [] },
  { id: 3, name: "Personne 3", avatar: "🎭", sounds: [] },
  { id: 4, name: "Personne 4", avatar: "🦄", sounds: [] }
];

// ============================
// BLOQUE SCROLL GLOBAL
// ============================
document.body.style.overflow = "hidden";
document.documentElement.style.overflow = "hidden";

let isDraggingGlobal = false;
document.addEventListener('touchmove', e => {
  if (isDraggingGlobal) e.preventDefault();
}, { passive: false });

// ============================
// PERSONNAGES
// ============================
const grid = document.getElementById('persons-grid');

const positions = [
  { x: 40, y: 40 },
  { x: 190, y: 90 },
  { x: 60, y: 240 },
  { x: 210, y: 260 }
];

persons.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = 'person-card';

  el.style.left = positions[i].x + "px";
  el.style.top = positions[i].y + "px";

  el.innerHTML = `<img src="assets/Character${p.id}.png" class="person-img"/>`;

  makeDraggable(el);
  el.addEventListener('click', () => openSoundboard(p));

  grid.appendChild(el);
});

// ============================
// NAVIGATION
// ============================
document.getElementById('enter-btn').addEventListener('click', goPersons);

function openSoundboard(person) {
  document.getElementById('page-persons').classList.remove('active');
  document.getElementById('page-soundboard').classList.add('active');

  document.getElementById('sb-avatar').textContent = person.avatar;
  document.getElementById('sb-name').textContent = person.name;
  document.getElementById('sb-count').textContent =
    `${person.sounds.length} son${person.sounds.length > 1 ? 's' : ''}`;
}

function goHome() {
  document.body.classList.add('is-home');
  document.getElementById('page-home').classList.add('active');
  document.getElementById('page-persons').classList.remove('active');
  document.getElementById('page-soundboard').classList.remove('active');
}

function goPersons() {
  document.body.classList.remove('is-home');
  document.getElementById('page-home').classList.remove('active');
  document.getElementById('page-persons').classList.add('active');
}

// ============================
// DRAG SYSTEM FIX COMPLET
// ============================
function makeDraggable(el) {
  let dragging = false;
  let startX, startY, origX, origY;

  function clamp(val, min, max) {
    return Math.max(min, Math.min(max, val));
  }

  function select() {
    document.querySelectorAll('.person-card')
      .forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  }

  // TOUCH
  el.addEventListener('touchstart', e => {
    const t = e.touches[0];
    dragging = true;
    isDraggingGlobal = true;

    startX = t.clientX;
    startY = t.clientY;

    origX = el.offsetLeft;
    origY = el.offsetTop;

    select();
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    if (!dragging) return;

    const t = e.touches[0];

    let x = origX + (t.clientX - startX);
    let y = origY + (t.clientY - startY);

    const maxX = window.innerWidth - el.offsetWidth;
    const maxY = window.innerHeight - el.offsetHeight;

    x = clamp(x, 0, maxX);
    y = clamp(y, 0, maxY);

    el.style.left = x + "px";
    el.style.top = y + "px";

    e.preventDefault();
  }, { passive: false });

  el.addEventListener('touchend', () => {
    dragging = false;
    isDraggingGlobal = false;
    inertia(el);
  });

  // MOUSE
  el.addEventListener('mousedown', e => {
    dragging = true;
    isDraggingGlobal = true;

    startX = e.clientX;
    startY = e.clientY;

    origX = el.offsetLeft;
    origY = el.offsetTop;

    select();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;

    let x = origX + (e.clientX - startX);
    let y = origY + (e.clientY - startY);

    const maxX = window.innerWidth - el.offsetWidth;
    const maxY = window.innerHeight - el.offsetHeight;

    x = clamp(x, 0, maxX);
    y = clamp(y, 0, maxY);

    el.style.left = x + "px";
    el.style.top = y + "px";
  });

  document.addEventListener('mouseup', () => {
    dragging = false;
    isDraggingGlobal = false;
    inertia(el);
  });
}

// ============================
// INERTIA
// ============================
function inertia(el) {
  let vx = 0;
  let vy = 0;

  let lastX = el.offsetLeft;
  let lastY = el.offsetTop;

  function step() {
    const x = el.offsetLeft;
    const y = el.offsetTop;

    vx = (x - lastX) * 0.9;
    vy = (y - lastY) * 0.9;

    lastX = x;
    lastY = y;

    let nx = x + vx;
    let ny = y + vy;

    const maxX = window.innerWidth - el.offsetWidth;
    const maxY = window.innerHeight - el.offsetHeight;

    nx = Math.max(0, Math.min(maxX, nx));
    ny = Math.max(0, Math.min(maxY, ny));

    el.style.left = nx + "px";
    el.style.top = ny + "px";

    if (Math.abs(vx) > 0.5 || Math.abs(vy) > 0.5) {
      requestAnimationFrame(step);
    }
  }

  requestAnimationFrame(step);
}
</script>

</body>
</html>
