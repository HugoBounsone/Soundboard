<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes bruits bizarres</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="is-home">

<!-- 🎬 VIDEO BACKGROUND GLOBAL -->
<video class="bg-video" autoplay muted loop playsinline>
  <source src="assets/HelloKitty2.mov">
</video>

<!-- ========== HOME ========== -->
<div id="page-home" class="page active">
  <img src="assets/MediaPlayer.png" class="media-player" id="media-player" />
  <img src="assets/Amp.png" class="deco-amp" id="deco-amp" />
  <img src="assets/enter_button.png" class="enter-btn" id="enter-btn" />
</div>

<!-- ========== PERSONNAGES ========== -->
<div id="page-persons" class="page">
  <div class="sb-header">
    <img src="assets/home_button.png" class="home-btn" onclick="goHome()" />
  </div>
  <div class="persons-grid" id="persons-grid"></div>
</div>

<!-- ========== SOUNDBOARD ========== -->
<div id="page-soundboard" class="page">
  <div class="sb-header">
    <button class="back-btn" onclick="goPersons()">← Retour</button>
    <div class="sb-person-info">
      <div class="sb-avatar" id="sb-avatar"></div>
      <div>
        <div class="sb-name" id="sb-name"></div>
        <div class="sb-count" id="sb-count"></div>
      </div>
    </div>
  </div>
  <div class="sounds-grid" id="sounds-grid"></div>
</div>

<script>
const persons = [
  { id: 1, name: "Personne 1", avatar: "😄", sounds: [] },
  { id: 2, name: "Personne 2", avatar: "🤪", sounds: [] },
  { id: 3, name: "Personne 3", avatar: "🎭", sounds: [] },
  { id: 4, name: "Personne 4", avatar: "🦄", sounds: [] }
];

// ============================
// POSITIONS INITIALES (fixes, mémorisées)
// ============================
const initialPositions = [
  { x: 40,  y: 40  },
  { x: 190, y: 90  },
  { x: 60,  y: 240 },
  { x: 210, y: 260 }
];

// Positions courantes — persistent quand on change de page
const currentPositions = initialPositions.map(p => ({ ...p }));

// ============================
// CONSTRUCTION DES CARTES
// ============================
const personsGrid = document.getElementById('persons-grid');
const cards = [];

persons.forEach((person, i) => {
  const card = document.createElement('div');
  card.className = 'person-card';
  card.style.left = currentPositions[i].x + 'px';
  card.style.top  = currentPositions[i].y + 'px';
  card.innerHTML = `<img src="assets/Character${person.id}.png" class="person-img" />`;
  card.addEventListener('click', () => openSoundboard(person));
  makeDraggable(card, i);
  personsGrid.appendChild(card);
  cards.push(card);
});

// ============================
// NAVIGATION
// ============================
document.getElementById('enter-btn').addEventListener('click', goPersons);

function openSoundboard(person) {
  document.getElementById('page-persons').classList.remove('active');
  document.getElementById('page-soundboard').classList.add('active');
  document.getElementById('sb-avatar').textContent = person.avatar;
  document.getElementById('sb-name').textContent = person.name;
  document.getElementById('sb-count').textContent =
    `${person.sounds.length} son${person.sounds.length > 1 ? 's' : ''}`;
}

function goHome() {
  stopSound();
  document.body.classList.add('is-home');
  document.getElementById('page-home').classList.add('active');
  document.getElementById('page-persons').classList.remove('active');
  document.getElementById('page-soundboard').classList.remove('active');
}

function goPersons() {
  stopSound();
  document.body.classList.remove('is-home');
  document.getElementById('page-home').classList.remove('active');
  document.getElementById('page-soundboard').classList.remove('active');
  document.getElementById('page-persons').classList.add('active');

  // Restaure les positions mémorisées
  cards.forEach((card, i) => {
    card.style.left = currentPositions[i].x + 'px';
    card.style.top  = currentPositions[i].y + 'px';
  });
}

// ============================
// AUDIO
// ============================
function stopSound() {}

// ============================
// DRAG + PHYSICS + LIMITES
// ============================
function makeDraggable(el, index) {
  let dragging = false;
  let startX, startY, origX, origY;
  let velocityX = 0, velocityY = 0;
  let lastX = 0, lastY = 0, lastTime = 0;
  let animFrame = null;

  function getGridBounds() {
    const grid = document.getElementById('persons-grid');
    return {
      maxX: grid.offsetWidth  - el.offsetWidth,
      maxY: grid.offsetHeight - el.offsetHeight
    };
  }

  function clamp(val, min, max) {
    return Math.max(min, Math.min(max, val));
  }

  function applyPos(x, y) {
    const { maxX, maxY } = getGridBounds();
    const cx = clamp(x, 0, maxX);
    const cy = clamp(y, 0, maxY);
    el.style.left = cx + 'px';
    el.style.top  = cy + 'px';
    if (index !== undefined) {
      currentPositions[index].x = cx;
      currentPositions[index].y = cy;
    }
  }

  function select() {
    document.querySelectorAll('.person-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  }

  // TOUCH
  el.addEventListener('touchstart', e => {
    if (animFrame) cancelAnimationFrame(animFrame);
    const t = e.touches[0];
    dragging = true;
    startX = t.clientX; startY = t.clientY;
    origX = el.offsetLeft; origY = el.offsetTop;
    velocityX = 0; velocityY = 0;
    lastX = origX; lastY = origY;
    lastTime = performance.now();
    select();
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    if (!dragging) return;
    e.preventDefault();
    const t = e.touches[0];
    const x = origX + (t.clientX - startX);
    const y = origY + (t.clientY - startY);
    const now = performance.now();
    const dt = now - lastTime || 16;
    velocityX = (x - lastX) / dt;
    velocityY = (y - lastY) / dt;
    lastX = x; lastY = y; lastTime = now;
    applyPos(x, y);
  }, { passive: false });

  el.addEventListener('touchend', () => {
    dragging = false;
    inertia();
  });

  // MOUSE
  el.addEventListener('mousedown', e => {
    if (animFrame) cancelAnimationFrame(animFrame);
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    origX = el.offsetLeft; origY = el.offsetTop;
    velocityX = 0; velocityY = 0;
    lastX = origX; lastY = origY;
    lastTime = performance.now();
    select();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const x = origX + (e.clientX - startX);
    const y = origY + (e.clientY - startY);
    const now = performance.now();
    const dt = now - lastTime || 16;
    velocityX = (x - lastX) / dt;
    velocityY = (y - lastY) / dt;
    lastX = x; lastY = y; lastTime = now;
    applyPos(x, y);
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    inertia();
  });

  // INERTIE avec limites
  function inertia() {
    let vx = velocityX * 20;
    let vy = velocityY * 20;

    function step() {
      vx *= 0.92;
      vy *= 0.92;
      const nx = el.offsetLeft + vx;
      const ny = el.offsetTop  + vy;
      applyPos(nx, ny);

      // Rebond sur les bords
      const { maxX, maxY } = getGridBounds();
      if (el.offsetLeft <= 0 || el.offsetLeft >= maxX) vx *= -0.4;
      if (el.offsetTop  <= 0 || el.offsetTop  >= maxY) vy *= -0.4;

      if (Math.abs(vx) > 0.3 || Math.abs(vy) > 0.3) {
        animFrame = requestAnimationFrame(step);
      }
    }
    animFrame = requestAnimationFrame(step);
  }
}

// Rendre Amp et MediaPlayer draggables aussi (sans index = pas de mémo)
makeDraggable(document.getElementById('deco-amp'));
makeDraggable(document.getElementById('media-player'));
</script>

</body>
</html>
