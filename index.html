<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes bruits bizarres</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="is-home">

<!-- 🎬 VIDEO BACKGROUND GLOBAL -->
<video class="bg-video" autoplay muted loop playsinline>
  <source src="assets/HelloKitty2.mov" type="video/quicktime">
  <source src="assets/HelloKitty2.mov" type="video/mp4">
</video>

<!-- ========== HOME ========== -->
<div id="page-home" class="page active">
  <img src="assets/MediaPlayer.png" class="media-player" id="media-player" />
  <img src="assets/Amp.png" class="deco-amp" id="deco-amp" />
  <img src="assets/enter_button.png" class="enter-btn" id="enter-btn" />
</div>

<!-- ========== PERSONNAGES ========== -->
<div id="page-persons" class="page">
  <div class="sb-header">
    <img src="assets/home_button.png" class="home-btn" onclick="goHome()" />
  </div>
  <div class="persons-grid" id="persons-grid"></div>
</div>

<!-- ========== SOUNDBOARD ========== -->
<div id="page-soundboard" class="page">
  <div class="sb-header">
    <img src="assets/character_button.png" class="home-btn" onclick="goPersons()" />
  </div>
  <div class="sounds-grid" id="sounds-grid"></div>
</div>

<script>
const persons = [
  {
    id: 1, name: "Personne 1",
    sounds: [
      { name: "Son 1", image: "assets/Sound1.png", file: "sounds/p1_son1.mp3" },
      { name: "Son 2", image: "assets/Sound2.png", file: "sounds/p1_son2.mp3" },
      { name: "Son 3", image: "assets/Sound3.png", file: "sounds/p1_son3.mp3" },
      { name: "Son 4", image: "assets/Sound4.png", file: "sounds/p1_son4.mp3" },
    ]
  },
  {
    id: 2, name: "Personne 2",
    sounds: [
      { name: "Son 1", image: "assets/Sound1.png", file: "sounds/p2_son1.mp3" },
      { name: "Son 2", image: "assets/Sound2.png", file: "sounds/p2_son2.mp3" },
      { name: "Son 3", image: "assets/Sound3.png", file: "sounds/p2_son3.mp3" },
      { name: "Son 4", image: "assets/Sound4.png", file: "sounds/p2_son4.mp3" },
    ]
  },
  {
    id: 3, name: "Personne 3",
    sounds: [
      { name: "Son 1", image: "assets/Sound1.png", file: "sounds/p3_son1.mp3" },
      { name: "Son 2", image: "assets/Sound2.png", file: "sounds/p3_son2.mp3" },
      { name: "Son 3", image: "assets/Sound3.png", file: "sounds/p3_son3.mp3" },
      { name: "Son 4", image: "assets/Sound4.png", file: "sounds/p3_son4.mp3" },
    ]
  },
  {
    id: 4, name: "Personne 4",
    sounds: [
      { name: "Son 1", image: "assets/Sound1.png", file: "sounds/p4_son1.mp3" },
      { name: "Son 2", image: "assets/Sound2.png", file: "sounds/p4_son2.mp3" },
      { name: "Son 3", image: "assets/Sound3.png", file: "sounds/p4_son3.mp3" },
      { name: "Son 4", image: "assets/Sound4.png", file: "sounds/p4_son4.mp3" },
    ]
  }
];

const currentPositions = [
  { x: 40,  y: 40  },
  { x: 190, y: 90  },
  { x: 60,  y: 240 },
  { x: 210, y: 260 }
];

// ============================
// CONSTRUCTION DES CARTES PERSONNAGES
// ============================
const personsGrid = document.getElementById('persons-grid');
const cards = [];

persons.forEach((person, i) => {
  const card = document.createElement('div');
  card.className = 'person-card';
  card.style.left = currentPositions[i].x + 'px';
  card.style.top  = currentPositions[i].y + 'px';
  // Animation float avec délai différent par carte
  card.style.animationDelay = (i * 0.8) + 's';
  card.innerHTML = `<img src="assets/Character${person.id}.png" class="person-img" />`;
  card.addEventListener('click', () => openSoundboard(person));
  makeDraggable(card, i, true);
  personsGrid.appendChild(card);
  cards.push(card);
});

// ============================
// NAVIGATION
// ============================
document.getElementById('enter-btn').addEventListener('click', goPersons);

function openSoundboard(person) {
  document.getElementById('page-persons').classList.remove('active');
  document.getElementById('page-soundboard').classList.add('active');

  const soundsGrid = document.getElementById('sounds-grid');
  soundsGrid.innerHTML = '';

  person.sounds.forEach(sound => {
    const card = document.createElement('div');
    card.className = 'sound-card';
    card.innerHTML = `<img src="${sound.image}" class="sound-img" alt="${sound.name}" />`;
    card.addEventListener('click', () => playSound(card, sound.file));
    soundsGrid.appendChild(card);
  });
}

function goHome() {
  stopSound();
  document.body.classList.add('is-home');
  document.getElementById('page-home').classList.add('active');
  document.getElementById('page-persons').classList.remove('active');
  document.getElementById('page-soundboard').classList.remove('active');
}

function goPersons() {
  stopSound();
  document.body.classList.remove('is-home');
  document.getElementById('page-home').classList.remove('active');
  document.getElementById('page-soundboard').classList.remove('active');
  document.getElementById('page-persons').classList.add('active');

  cards.forEach((card, i) => {
    card.style.left = currentPositions[i].x + 'px';
    card.style.top  = currentPositions[i].y + 'px';
  });
}

// ============================
// AUDIO
// ============================
let currentAudio = null;
let currentCard  = null;

function playSound(card, file) {
  stopSound();
  const audio = new Audio(file);
  currentAudio = audio;
  currentCard  = card;
  card.classList.add('playing');
  audio.play().catch(() => playPlaceholderBip());
  audio.addEventListener('ended', () => {
    card.classList.remove('playing');
    currentAudio = null;
    currentCard  = null;
  });
}

function stopSound() {
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
  if (currentCard)  { currentCard.classList.remove('playing'); currentCard = null; }
}

function playPlaceholderBip() {
  const ctx  = new (window.AudioContext || window.webkitAudioContext)();
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.value = 300 + Math.random() * 400;
  osc.type = ['sine','square','sawtooth','triangle'][Math.floor(Math.random() * 4)];
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
  osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.6);
}

// ============================
// DRAG SIMPLE — corrigé pour la home
// ============================
function makeDraggable(el, index, isPersonCard) {
  let dragging = false;
  let startX, startY, origX, origY;

  // Limite : moitié de l'élément peut sortir de l'écran
  function applyPos(x, y) {
    const halfW = el.offsetWidth  / 2;
    const halfH = el.offsetHeight / 2;

    let minX, maxX, minY, maxY;

    if (isPersonCard) {
      // Cartes personnages : peuvent sortir de moitié
      const grid = document.getElementById('persons-grid');
      minX = -halfW;
      maxX = grid.offsetWidth  - halfW;
      minY = -halfH;
      maxY = grid.offsetHeight - halfH;
    } else {
      // Éléments home : limités à la page entière
      minX = 0;
      maxX = window.innerWidth  - el.offsetWidth;
      minY = 0;
      maxY = window.innerHeight - el.offsetHeight;
    }

    const cx = Math.max(minX, Math.min(maxX, x));
    const cy = Math.max(minY, Math.min(maxY, y));
    el.style.left = cx + 'px';
    el.style.top  = cy + 'px';

    if (index !== undefined) {
      currentPositions[index].x = cx;
      currentPositions[index].y = cy;
    }
  }

  // TOUCH
  el.addEventListener('touchstart', e => {
    e.stopPropagation();
    const t = e.touches[0];
    dragging = true;
    startX = t.clientX;
    startY = t.clientY;
    origX  = el.offsetLeft;
    origY  = el.offsetTop;
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    if (!dragging) return;
    e.preventDefault();
    const t = e.touches[0];
    applyPos(origX + (t.clientX - startX), origY + (t.clientY - startY));
  }, { passive: false });

  el.addEventListener('touchend', () => { dragging = false; });

  // MOUSE
  el.addEventListener('mousedown', e => {
    e.stopPropagation();
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    origX  = el.offsetLeft;
    origY  = el.offsetTop;
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    applyPos(origX + (e.clientX - startX), origY + (e.clientY - startY));
  });

  document.addEventListener('mouseup', () => { dragging = false; });
}

// Home : drag de Amp et MediaPlayer
makeDraggable(document.getElementById('deco-amp'),     undefined, false);
makeDraggable(document.getElementById('media-player'), undefined, false);
</script>

</body>
</html>
